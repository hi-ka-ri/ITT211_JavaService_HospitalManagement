spring.application.name=IT211_JavaService_HospitalManagement
server.port=${SERVER_PORT:8080}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/hospital_management_api_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:12345$}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

jwt.secret=${JWT_SECRET:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
jwt.access-expiration-ms=${JWT_ACCESS_EXPIRATION_MS:1800000}
jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}

# If Cloudinary credentials are empty, upload will fall back to local storage for Postman testing.
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:dn2omymsm}
cloudinary.api-key=${CLOUDINARY_API_KEY:249578228778799}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:LlbU97swUrIs3U4dPXfpviCTnBE}
cloudinary.folder=${CLOUDINARY_FOLDER:hospital-management/medical-records}

file.public-base-url=${FILE_PUBLIC_BASE_URL:http://localhost:8080/files/medical-records}
file.upload-dir=${FILE_UPLOAD_DIR:uploads/medical-records}

app.password-reset-expiration-minutes=${PASSWORD_RESET_EXPIRATION_MINUTES:15}

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=60000
app.token-blacklist.prefix=${TOKEN_BLACKLIST_PREFIX:hospital:blacklist:access:}
